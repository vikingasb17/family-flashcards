<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Family — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FFF8F0;
    --warm-peach: #FFE5CC;
    --coral: #FF7B54;
    --coral-dark: #e05e39;
    --sage: #A8C5A0;
    --sage-dark: #6b9b62;
    --lavender: #C4AADF;
    --gold: #F4C44E;
    --ink: #2D2218;
    --muted: #9B8578;
    --card-bg: #FFFFFF;
    --shadow: 0 8px 32px rgba(45,34,24,0.12);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,123,84,0.08) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(196,170,223,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(168,197,160,0.06) 0%, transparent 70%);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.7s ease both;
  }

  header .label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 700;
    margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--ink);
    line-height: 1.1;
  }

  header h1 span {
    color: var(--coral);
  }

  header p {
    color: var(--muted);
    margin-top: 10px;
    font-size: 14px;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 680px;
    background: var(--warm-peach);
    border-radius: 100px;
    height: 6px;
    margin-bottom: 28px;
    overflow: hidden;
    animation: fadeDown 0.7s 0.1s ease both;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--gold));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .progress-text {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    animation: fadeDown 0.7s 0.15s ease both;
  }

  /* === FLASHCARD === */
  .scene {
    width: 100%;
    max-width: 560px;
    height: 380px;
    perspective: 1200px;
    cursor: pointer;
    animation: fadeUp 0.6s 0.2s ease both;
    margin-bottom: 28px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(.4,0,.2,1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    box-shadow: var(--shadow), 0 2px 0 rgba(255,255,255,0.8) inset;
  }

  .face-front {
    background: var(--card-bg);
    border: 2px solid var(--warm-peach);
  }

  .face-back {
    background: linear-gradient(135deg, #fff9f4 0%, #fff3e8 100%);
    border: 2px solid var(--warm-peach);
    transform: rotateY(180deg);
  }

  .emoji-icon {
    font-size: 64px;
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .word-en {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--ink);
    font-weight: 700;
    text-align: center;
    line-height: 1.1;
  }

  .transcription {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
    letter-spacing: 0.5px;
  }

  .flip-hint {
    position: absolute;
    bottom: 14px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .flip-hint::before, .flip-hint::after {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--warm-peach);
  }

  /* Back face */
  .word-ru {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    color: var(--coral);
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }

  .sentence-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--sage-dark);
    margin-top: 16px;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .sentence-en {
    font-size: 0.92rem;
    color: var(--ink);
    text-align: center;
    line-height: 1.6;
    font-weight: 600;
  }

  .sentence-ru {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
    line-height: 1.5;
  }

  /* === AUDIO BUTTON === */
  .audio-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--coral);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 10px 22px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 14px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(255,123,84,0.25);
    position: absolute;
    bottom: 48px;
  }

  .audio-btn:hover {
    background: var(--coral-dark);
    transform: scale(1.04);
    box-shadow: 0 6px 16px rgba(255,123,84,0.35);
  }

  .audio-btn:active { transform: scale(0.97); }

  .audio-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .audio-btn.playing {
    background: var(--sage-dark);
    box-shadow: 0 4px 12px rgba(107,155,98,0.3);
  }

  /* === NAVIGATION === */
  .nav {
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .nav-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid var(--warm-peach);
    background: white;
    color: var(--ink);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--coral);
    color: var(--coral);
    transform: scale(1.08);
    box-shadow: 0 4px 14px rgba(255,123,84,0.2);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .nav-counter {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--ink);
    min-width: 80px;
    text-align: center;
  }

  /* === WORD LIST === */
  .grid {
    width: 100%;
    max-width: 680px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 40px;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .grid-item {
    background: white;
    border: 2px solid var(--warm-peach);
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .grid-item:hover, .grid-item.active {
    border-color: var(--coral);
    box-shadow: 0 4px 14px rgba(255,123,84,0.15);
    transform: translateY(-2px);
  }

  .grid-item.active { background: #fff5f0; }

  .grid-en { font-weight: 700; font-size: 13px; color: var(--ink); }
  .grid-ru { font-size: 12px; color: var(--muted); }
  .grid-emoji { font-size: 20px; margin-bottom: 2px; }

  /* === ANIMATIONS === */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-slide-in {
    animation: slideIn 0.4s cubic-bezier(.4,0,.2,1) both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Decorative dots */
  .dots {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }

  .dot {
    position: absolute;
    border-radius: 50%;
    opacity: 0.4;
  }

  .dot:nth-child(1) { width: 200px; height: 200px; background: var(--warm-peach); top: -60px; left: -60px; }
  .dot:nth-child(2) { width: 120px; height: 120px; background: var(--lavender); bottom: 10%; right: -30px; opacity: 0.25; }
  .dot:nth-child(3) { width: 80px; height: 80px; background: var(--gold); top: 40%; left: 2%; opacity: 0.2; }
</style>
</head>
<body>

<div class="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<header>
  <div class="label">English · Russian</div>
  <h1>My <span>Family</span></h1>
  <p>Click a card to reveal the translation · Use arrows to navigate</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="progress-text" id="progressText">Card 1 of 9</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face-front" id="frontFace"></div>
    <div class="face face-back" id="backFace"></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
  <span class="nav-counter" id="navCounter">1 / 9</span>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
</div>

<div class="grid" id="wordGrid"></div>

<script>
const words = [
  {
    en: "parents",
    ru: "родители",
    transcription: "/ˈpeərənts/",
    emoji: "👨‍👩‍👧",
    sentenceEn: "My parents are very kind and caring.",
    sentenceRu: "Мои родители очень добрые и заботливые."
  },
  {
    en: "a boy",
    ru: "мальчик",
    transcription: "/ə bɔɪ/",
    emoji: "👦",
    sentenceEn: "There is a boy playing in the garden.",
    sentenceRu: "В саду играет мальчик."
  },
  {
    en: "a girl",
    ru: "девочка",
    transcription: "/ə ɡɜːrl/",
    emoji: "👧",
    sentenceEn: "A girl is reading a book on the sofa.",
    sentenceRu: "Девочка читает книгу на диване."
  },
  {
    en: "children",
    ru: "дети",
    transcription: "/ˈtʃɪldrən/",
    emoji: "👨‍👧‍👦",
    sentenceEn: "The children are playing happily in the park.",
    sentenceRu: "Дети счастливо играют в парке."
  },
  {
    en: "grandparents",
    ru: "бабушка и дедушка",
    transcription: "/ˈɡrændpeərənts/",
    emoji: "👴👵",
    sentenceEn: "We visit our grandparents every weekend.",
    sentenceRu: "Мы навещаем бабушку и дедушку каждые выходные."
  },
  {
    en: "uncle",
    ru: "дядя",
    transcription: "/ˈʌŋkəl/",
    emoji: "👨",
    sentenceEn: "My uncle tells the best stories at dinner.",
    sentenceRu: "Мой дядя рассказывает лучшие истории за ужином."
  },
  {
    en: "a cousin",
    ru: "двоюродный брат / сестра",
    transcription: "/ə ˈkʌzən/",
    emoji: "🧑",
    sentenceEn: "I have a cousin who lives in another city.",
    sentenceRu: "У меня есть двоюродный брат, который живёт в другом городе."
  },
  {
    en: "family",
    ru: "семья",
    transcription: "/ˈfæməli/",
    emoji: "👨‍👩‍👧‍👦",
    sentenceEn: "My family has dinner together every evening.",
    sentenceRu: "Моя семья ужинает вместе каждый вечер."
  }
];

let current = 0;
let isFlipped = false;

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.9;
  utt.pitch = 1;

  const btn = document.getElementById('audioBtn');
  if (btn) {
    btn.classList.add('playing');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> Speaking…`;
    utt.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = audioIcon() + ' Listen';
    };
  }
  window.speechSynthesis.speak(utt);
}

function audioIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
}

function renderCard() {
  const w = words[current];
  const front = document.getElementById('frontFace');
  const back = document.getElementById('backFace');

  front.innerHTML = `
    <div class="emoji-icon">${w.emoji}</div>
    <div class="word-en">${w.en}</div>
    <div class="transcription">${w.transcription}</div>
    <button class="audio-btn" id="audioBtn" onclick="event.stopPropagation(); speak('${w.en}')">
      ${audioIcon()} Listen
    </button>
    <div class="flip-hint">tap to flip</div>
  `;

  back.innerHTML = `
    <div class="word-ru">${w.ru}</div>
    <div class="transcription">${w.transcription}</div>
    <div class="sentence-label">Example sentence</div>
    <div class="sentence-en">${w.sentenceEn}</div>
    <div class="sentence-ru">${w.sentenceRu}</div>
    <button class="audio-btn" onclick="event.stopPropagation(); speak('${w.sentenceEn}')">
      ${audioIcon()} Listen
    </button>
  `;

  // Update progress
  const pct = ((current + 1) / words.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Card ${current + 1} of ${words.length}`;
  document.getElementById('navCounter').textContent = `${current + 1} / ${words.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === words.length - 1;

  // Update grid
  document.querySelectorAll('.grid-item').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });

  // Animate
  document.getElementById('card').classList.add('card-slide-in');
  setTimeout(() => document.getElementById('card').classList.remove('card-slide-in'), 400);
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= words.length) return;
  window.speechSynthesis && window.speechSynthesis.cancel();
  current = next;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  setTimeout(renderCard, 50);
}

// Build grid
const grid = document.getElementById('wordGrid');
words.forEach((w, i) => {
  const item = document.createElement('div');
  item.className = 'grid-item' + (i === 0 ? ' active' : '');
  item.innerHTML = `<div class="grid-emoji">${w.emoji}</div><div class="grid-en">${w.en}</div><div class="grid-ru">${w.ru}</div>`;
  item.onclick = () => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    current = i;
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
    setTimeout(renderCard, 50);
  };
  grid.appendChild(item);
});

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'Enter') speak(words[current].en);
});

renderCard();
</script>
</body>
</html>
